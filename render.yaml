services:
  - type: web
    name: careerfit-backend
    runtime: python
    plan: free
    region: oregon
    branch: main
    rootDirectory: backend

    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"

    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: CAREERFIT_ENVIRONMENT
        value: production
      - group: database
        - key: CAREERFIT_DATABASE_URL
          sync: false
      - key: CAREERFIT_LLM_ENABLED
        value: "false"
      - key: CAREERFIT_LLM_TIMEOUT_SECONDS
        value: "120"

databases:
  - name: careerfit-db
    region: oregon
    plan: free
    databaseName: careerfit
    user: careerfit
