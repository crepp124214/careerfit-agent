services:
  - type: web
    name: careerfit-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: CAREERFIT_ENVIRONMENT
        value: production
      - key: CAREERFIT_DATABASE_URL
        fromDatabase:
          name: careerfit-db
          property: connectionString
      - key: CAREERFIT_LLM_ENABLED
        value: false
      - key: CAREERFIT_LLM_TIMEOUT_SECONDS
        value: 120

databases:
  - name: careerfit-db
    region: oregon
    plan: free
    databaseName: careerfit
    user: careerfit
