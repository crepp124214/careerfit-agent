services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: careerfit
      POSTGRES_USER: careerfit
      POSTGRES_PASSWORD: careerfit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careerfit -d careerfit"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      CAREERFIT_DATABASE_URL: postgresql+psycopg://careerfit:careerfit@postgres:5432/careerfit
      CAREERFIT_ENVIRONMENT: docker
      CAREERFIT_LLM_ENABLED: ${CAREERFIT_LLM_ENABLED:-false}
      CAREERFIT_LLM_PROVIDER: ${CAREERFIT_LLM_PROVIDER:-openai_compatible}
      CAREERFIT_LLM_BASE_URL: ${CAREERFIT_LLM_BASE_URL:-https://api.openai.com/v1}
      CAREERFIT_LLM_API_KEY: ${CAREERFIT_LLM_API_KEY:-}
      CAREERFIT_LLM_MODEL: ${CAREERFIT_LLM_MODEL:-}
      CAREERFIT_LLM_API_STYLE: ${CAREERFIT_LLM_API_STYLE:-chat_completions}
      CAREERFIT_LLM_TIMEOUT_SECONDS: ${CAREERFIT_LLM_TIMEOUT_SECONDS:-120}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000/api
        VITE_APP_VARIANT: fullstack
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
